<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFWI AI Routing Workshop</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#EDECEA;min-height:100vh}

/* HEADER */
#app-header{background:#1A2A4A;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#app-header h1{font-size:17px;font-weight:700;letter-spacing:.3px}
.phase-stepper{display:flex;gap:6px;align-items:center}
.phase-pip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,.15);color:rgba(255,255,255,.55);cursor:default;transition:all .2s}
.phase-pip.active{background:#fff;color:#1A2A4A}
.phase-pip.done{background:rgba(255,255,255,.3);color:#fff;cursor:pointer}
#btn-reset{background:none;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);font-size:12px;padding:4px 10px;border-radius:4px;cursor:pointer;display:none}
#btn-reset:hover{background:rgba(255,255,255,.1)}

/* CONTAINER */
.container{max-width:960px;margin:0 auto;padding:24px 16px}

/* PHASE 1 — ROLE */
#phase-role{max-width:980px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 3px 20px rgba(0,0,0,.12);overflow:hidden}
.role-phase-header{background:#1A2A4A;color:#fff;padding:22px 28px}
.role-phase-header h2{font-size:20px;font-weight:700;margin-bottom:4px}
.role-phase-header p{font-size:13px;opacity:.75}
.cat-section{padding:0 0 4px}
.cat-label{font-size:10.5px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.8px;padding:8px 20px;background:#1A2A4A;opacity:.85}
.role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0;border-bottom:1px solid #EBEBE7}
.role-card{background:#fff;border:none;border-right:1px solid #EBEBE7;padding:13px 16px;cursor:pointer;transition:background .12s;text-align:left}
.role-card:hover{background:#F5F4F2}
.role-card.selected{background:#EFF4F9;box-shadow:inset 3px 0 0 #1A2A4A}
.role-card .r-name{font-size:13px;font-weight:600;color:#1A2A4A;line-height:1.35}
.role-card .r-workers{font-size:10.5px;color:#999;margin-top:3px}

/* PHASE 2 — ROUTING */
#phase-routing{display:none}
.cluster-progress{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.cluster-progress .cp-label{font-size:13px;color:#555;white-space:nowrap}
.cp-pips{display:flex;gap:5px;flex:1}
.cp-pip{width:24px;height:24px;border-radius:50%;border:2px solid #ccc;background:#eee;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#aaa;transition:all .2s}
.cp-pip.done{background:#1A2A4A;border-color:#1A2A4A;color:#fff}
.cp-pip.active{background:#fff;border-color:#1A2A4A;color:#1A2A4A}
.cluster-card{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.cluster-card h2{font-size:18px;font-weight:700;color:#1A2A4A;margin-bottom:4px}
.cluster-card p{font-size:13px;color:#666}
.questions-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden;margin-bottom:12px}
.dir-bar{display:grid;grid-template-columns:200px 1fr;background:#f5f4f2;border-bottom:1px solid #e0dedd}
.dir-bar .dir-spacer{border-right:1px solid #e0dedd}
.dir-bar .dir-text{text-align:center;font-size:11px;color:#888;padding:6px 0;letter-spacing:.3px}
.q-row{display:grid;grid-template-columns:200px 1fr;border-bottom:1px solid #f0efed;align-items:stretch}
.q-row:last-child{border-bottom:none}
.q-label{padding:12px 14px;border-right:1px solid #e0dedd;display:flex;flex-direction:column;justify-content:center;transition:background .2s,border-left .2s}
.q-label .q-num{font-size:10px;color:#aaa;font-weight:600;margin-bottom:2px}
.q-label .q-name{font-size:13px;font-weight:700;color:#1A2A4A;line-height:1.2}
.q-label .q-text{font-size:11px;color:#777;margin-top:3px;line-height:1.35}
.q-label.floor-hl{border-left:4px solid #7B2020;background:#fdf5f5}
.q-label.floor-hitl{border-left:4px solid #B85520;background:#fdf8f5}
.q-label.floor-hotl{border-left:4px solid #9B7200;background:#fdfbf0}
.answers-row{display:grid;grid-template-columns:repeat(4,1fr)}
.a-cell{padding:12px 11px 10px;cursor:pointer;transition:filter .12s;position:relative;display:flex;flex-direction:column;border-right:1px solid rgba(0,0,0,.08);user-select:none;-webkit-user-select:none;min-height:88px}
.a-cell:last-child{border-right:none}
.a-cell:hover{filter:brightness(.91)}
.a-cell.selected{outline:3px solid #1A2A4A;outline-offset:-3px;z-index:2}
.a-cell.selected::after{content:'✓';position:absolute;top:5px;right:8px;font-size:14px;font-weight:800;pointer-events:none}
.a-cell.hl.selected::after,.a-cell.hitl.selected::after,.a-cell.hotl.selected::after{color:#fff}
.a-cell.none-min.selected::after{color:#1A2A4A}
.a-cell .a-label{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:4px;padding-right:16px}
.a-cell .a-sub{font-size:10.5px;line-height:1.35;opacity:.82;flex:1}
.a-cell .a-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:7px;border-top:1px solid rgba(255,255,255,.25);padding-top:5px}
.a-cell.none-min .a-badge{border-top-color:rgba(0,0,0,.12);color:#888}
/* Floor visuals — cells overcome by higher-priority answer are dimmed but still clickable */
.a-cell.floor-locked:not(.selected){opacity:.22;filter:grayscale(55%)}
.a-cell.floor-ceil-hl  {box-shadow:inset -4px 0 0 #7B2020}
.a-cell.floor-ceil-hitl{box-shadow:inset -4px 0 0 #B85520}
.a-cell.floor-ceil-hotl{box-shadow:inset -4px 0 0 #9B7200}
.a-cell.selected.floor-ceil-hl,.a-cell.selected.floor-ceil-hitl,.a-cell.selected.floor-ceil-hotl{outline:3px solid #1A2A4A;outline-offset:-3px}

.result-bar{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.result-label-sm{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;white-space:nowrap}
.result-badge{padding:7px 20px;border-radius:20px;font-size:14px;font-weight:700;color:#fff;transition:background .2s}
.result-constraint{font-size:12px;color:#777;font-style:italic;flex:1}
.routing-nav{display:flex;gap:10px;justify-content:flex-end}
.btn{padding:9px 20px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-sec{background:#e8e7e4;color:#333}
.btn-sec:hover{background:#d8d7d4}
.btn-pri{background:#1A2A4A;color:#fff}
.btn-pri:hover{background:#253d68}
.btn-pri:disabled{background:#ccc;cursor:not-allowed}

/* GROUP DIVIDERS */
.group-divider{padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.group-divider.g1{background:#5a1818}
.group-divider.g2{background:#7a3810}
.group-divider.g3{background:#6a5000}
.group-divider .g-desc{font-size:10px;font-weight:400;opacity:.8;text-transform:none;letter-spacing:0}

/* PHASE 3 — SKILL SORT */
#phase-skills{display:none}
.ss-header{margin-bottom:16px}
.ss-header h2{font-size:20px;font-weight:700;color:#1A2A4A}
.ss-header p{font-size:13px;color:#666;margin-top:4px}

/* Pool */
.ss-pool-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:9px;display:flex;align-items:center;gap:8px}
#pool-drop-zone{background:#fff;border:2px dashed #C4C3BD;border-radius:10px;padding:14px;min-height:76px;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;transition:border-color .12s,background .12s;margin-bottom:6px}
#pool-drop-zone.drag-over{border-color:#888;background:#F5F4F2}

/* Category legend */
.cat-legend{display:flex;gap:18px;margin-bottom:22px;font-size:11px;color:#888}
.cat-legend span{display:flex;align-items:center;gap:5px}
.legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* Sequence bar */
.seq-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:10.5px;font-weight:700;color:#AAA;text-transform:uppercase;letter-spacing:.6px}
.seq-line{flex:1;height:2px;background:linear-gradient(to right,#7B2020 0%,#B85520 40%,#9B7200 75%,#CCC 100%);border-radius:2px;position:relative}
.seq-line::after{content:'▶';position:absolute;right:-6px;top:-4px;font-size:9px;color:#CCC}

/* Cluster columns grid */
#ss-columns{display:grid;gap:12px;margin-bottom:28px;align-items:start}
.cluster-col{border-radius:10px;overflow:visible;box-shadow:0 1px 4px rgba(0,0,0,.10);display:flex;flex-direction:column}
.cluster-col-header{border-radius:10px 10px 0 0;overflow:hidden;padding:12px 14px 11px}
.cluster-col-header .bucket-badge{display:inline-block;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.8);background:rgba(0,0,0,.20);border-radius:3px;padding:2px 6px;margin-bottom:7px}
.cluster-col-header h3{font-size:13px;font-weight:700;color:#fff;line-height:1.3}

/* Drop zones */
.cluster-drop-zone{background:#FAF9F7;flex:1;min-height:190px;padding:10px;display:flex;flex-direction:column;gap:6px;align-content:flex-start;transition:background .12s;overflow:hidden}
.cluster-drop-zone.drag-over{background:#F0EEE8}
.cluster-drop-zone .empty-hint{font-size:11px;color:#C8C7C0;text-align:center;padding:18px 8px;font-style:italic;pointer-events:none}

/* Skill pills */
.skill-pill{padding:6px 9px;border-radius:5px;font-size:12px;font-weight:600;color:#fff;cursor:grab;user-select:none;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:opacity .2s}
.skill-pill:active{cursor:grabbing}
.skill-pill.dragging{opacity:.4}
.skill-pill.dropped{text-decoration:line-through;opacity:.45}
.pill-drop-confirm{display:flex;align-items:center;gap:4px;flex-shrink:0}
.pill-drop-confirm label{font-size:10px;opacity:.85;cursor:pointer;white-space:nowrap}
.pill-drop-confirm input{cursor:pointer;width:13px;height:13px}

/* Gap */
.gap-wrap{position:relative;background:#F2F1EE;border-top:1px solid #E4E3DF;padding:8px 10px}
.gap-wrap::before{content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:0;right:0;background:#1A2A4A;color:rgba(255,255,255,.92);font-size:11.5px;line-height:1.55;padding:9px 11px;border-radius:7px;opacity:0;pointer-events:none;transition:opacity .15s;z-index:200;white-space:normal;box-shadow:0 3px 12px rgba(0,0,0,.22)}
.gap-wrap::after{content:'';position:absolute;bottom:calc(100% + 1px);left:14px;border:5px solid transparent;border-top-color:#1A2A4A;opacity:0;pointer-events:none;transition:opacity .15s;z-index:200}
.gap-wrap:hover::before,.gap-wrap:hover::after{opacity:1}
.gap-btn{background:none;border:1px dashed #aaa;color:#888;font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;width:100%}
.gap-btn:hover{border-color:#555;color:#444}
.gap-input-wrap{display:flex;gap:6px;margin-top:6px}
.gap-input-wrap input{flex:1;font-size:12px;padding:4px 8px;border:1px solid #ccc;border-radius:4px}
.gap-input-wrap button{font-size:11px;padding:4px 10px;border:none;border-radius:4px;cursor:pointer;background:#1A2A4A;color:#fff}
.gap-pill{border:2px dashed rgba(255,255,255,.6)!important}

/* SUMMARY TABLE */
.ss-summary{margin-top:24px}
.ss-summary h3{font-size:14px;font-weight:700;color:#1A2A4A;margin-bottom:10px}
.summary-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);font-size:12px}
.summary-table th{background:#1A2A4A;color:#fff;padding:9px 12px;text-align:left;font-weight:600}
.summary-table td{padding:8px 12px;border-bottom:1px solid #f0efed;vertical-align:middle}
.summary-table tr:last-child td{border-bottom:none}
.summary-table tr:hover td{background:#fafaf9}
.summary-table tr.skill-dropped td{opacity:.55;text-decoration:line-through}
.summary-table tr.skill-dropped td:last-child{text-decoration:none}
.tb-badge{padding:2px 10px;border-radius:10px;color:#fff;font-size:11px;font-weight:700;white-space:nowrap}
.tb-badge.fate-deepens{background:#1A2A4A}
.tb-badge.fate-persists{background:#B85520}
.tb-badge.fate-drop{background:#9B7200}
.tb-badge.fate-dropped{background:#7B2020}
.tb-badge.fate-unassigned{background:#aaa}
.tb-badge.fate-new{background:#2C6E8A}
.export-row{margin-top:20px;padding-top:16px;border-top:1px solid #e8e7e4;display:flex;justify-content:flex-end}
.btn-export{background:#1A2A4A;color:#fff;border:none;border-radius:6px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px}
.btn-export:hover{background:#2a3d5e}
.btn-export svg{flex-shrink:0}

/* SKILL CAT COLORS */
.cat-foundational{background:#2C5F8A}
.cat-core{background:#5A7A3A}
.cat-baseline{background:#7A5A2A}
.cat-gap{background:#555;font-style:italic}

/* UTILITY */
.hidden{display:none!important}
</style>
</head>

// ─── COMPUTE RESULT ───────────────────────────────────────────
function computeResult(answers) {
  let topLevel = 0, topBucket = 'auto', sourceQId = null, sourceLabel = null;
  for (const q of ROUTING_QUESTIONS) {
    const score = answers?.[q.id];
    if (!score) continue;
    const opt = q.options.find(o => o.score === score);
    if (!opt || opt.min === 'none') continue;
    const lv = LEVEL[opt.min] || 0;
    if (lv > topLevel) {
      topLevel = lv; topBucket = opt.min;
      sourceQId = q.id; sourceLabel = q.label;
    }
  }
  return { bucket: topBucket, sourceQId, sourceLabel };
}

function currentFloorLevel(answers) {
  const { bucket, sourceQId } = computeResult(answers);
  // Only apply a floor when an actual answer triggered a minimum.
  // 'auto' is the no-answers default — no real floor is set yet.
  if (!sourceQId) return 0;
  return LEVEL[bucket] || 0;
}

// ─── PHASE CONTROL ────────────────────────────────────────────
function showPhase(p) {
  APP.phase = p;
  document.getElementById('phase-role').style.display = p==='role' ? 'block' : 'none';
  document.getElementById('phase-routing').style.display = p==='routing' ? 'block' : 'none';
  document.getElementById('phase-skills').style.display = p==='skills' ? 'block' : 'none';
  document.getElementById('pip1').className = 'phase-pip' + (p==='role' ? ' active' : ' done');
  document.getElementById('pip2').className = 'phase-pip' + (p==='routing' ? ' active' : p==='skills' ? ' done' : '');
  document.getElementById('pip3').className = 'phase-pip' + (p==='skills' ? ' active' : '');
  document.getElementById('btn-reset').style.display = p==='role' ? 'none' : '';
  if (p==='routing') renderRoutingPhase();
  if (p==='skills') renderSkillSortPhase();
}

function resetAll() {
  APP = { phase:'role', role:null, roleData:null, clusterIdx:0,
          answers:{}, results:{}, constraints:{}, placements:{}, drops:{}, newSkills:[] };
  dragDropInitialized = false;
  showPhase('role');
}

// ─── PHASE 1: ROLE SELECTION ──────────────────────────────────
function renderRolePhase() {
  const el = document.getElementById('phase-role');
  let html = `<div class="role-phase-header"><h2>Select a Role</h2><p>Choose the occupation you want to route through the AI decision framework.</p></div>`;
  for (const [catKey, cat] of Object.entries(ROLE_CATEGORIES)) {
    html += `<div class="cat-section"><div class="cat-label">${cat.label}</div><div class="role-grid">`;
    for (const roleName of cat.roles) {
      const rd = WORKSHOP_ROLES[roleName];
      if (!rd) continue;
      html += `<div class="role-card" data-role="${esc(roleName)}" onclick="selectRole(this,'${esc(roleName)}')">
        <div class="r-name">${esc(roleName)}</div>
        <div class="r-workers">${rd.workers}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

function selectRole(card, roleName) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  APP.role = roleName;
  APP.roleData = WORKSHOP_ROLES[roleName];
  APP.clusterIdx = 0;
  APP.answers = {};
  APP.results = {};
  APP.constraints = {};
  APP.placements = {};
  APP.drops = {};
  APP.newSkills = [];
  setTimeout(() => showPhase('routing'), 180);
}

// ─── PHASE 2: ROUTING ─────────────────────────────────────────
function renderRoutingPhase() {
  const clusters = APP.roleData.clusters;
  const idx = APP.clusterIdx;
  const cluster = clusters[idx];
  const answers = APP.answers[cluster.id] || {};
  const floorLv = currentFloorLevel(answers);
  const { bucket, sourceLabel } = computeResult(answers);
  const allAnswered = ROUTING_QUESTIONS.every(q => answers[q.id]);

  // Progress pips
  let pips = '';
  for (let i = 0; i < clusters.length; i++) {
    const cls = i < idx ? 'done' : i === idx ? 'active' : '';
    pips += `<div class="cp-pip ${cls}">${i+1}</div>`;
  }

  // Build question rows, grouped
  let qHtml = '';
  let lastGroup = null;
  for (const q of ROUTING_QUESTIONS) {
    if (q.group !== lastGroup) {
      const gClass = ['','g1','g2','g3'][q.group];
      qHtml += `<div class="group-divider ${gClass}">
        <span>${q.groupLabel}</span>
        <span class="g-desc">${q.groupDesc}</span>
      </div>`;
      lastGroup = q.group;
    }
    const selectedScore = answers[q.id];

    // q-label floor class
    let qLabelClass = 'q-label';
    if (floorLv >= LEVEL.hl) qLabelClass += ' floor-hl';
    else if (floorLv >= LEVEL.hitl) qLabelClass += ' floor-hitl';
    else if (floorLv >= LEVEL.hotl) qLabelClass += ' floor-hotl';

    // build cells
    let cellsHtml = '';
    // Pre-compute the "ceiling" index: last option whose min level >= the current floor
    // (used to draw the inset right-edge boundary marker)
    let ceilIdx = -1;
    q.options.forEach((o, i) => { if ((LEVEL[o.min] || 0) >= floorLv) ceilIdx = i; });

    for (let oi = 0; oi < q.options.length; oi++) {
      const opt = q.options[oi];
      const cc = CELL_COLORS[opt.min] || CELL_COLORS.none;
      const isSelected = selectedScore === opt.score;
      const optLevel = LEVEL[opt.min] || 0;
      const minClass = opt.min === 'none' ? 'none-min' : opt.min;
      let cellClass = `a-cell ${minClass}`;
      if (isSelected) cellClass += ' selected';
      // Floor visual: dim cells that can't affect result (below current floor), but keep clickable
      if (floorLv > 0 && optLevel < floorLv) cellClass += ' floor-locked';
      // Boundary marker: inset right border on the last "active" cell in this row
      if (floorLv > 0 && oi === ceilIdx && ceilIdx < q.options.length - 1) cellClass += ' floor-ceil-' + bucket;
      cellsHtml += `<div class="${cellClass}"
        style="background:${cc.bg};color:${cc.text}"
        data-qid="${q.id}" data-score="${opt.score}" data-cid="${cluster.id}"
        onclick="selectAnswer('${cluster.id}','${q.id}',${opt.score})">
        <div class="a-label">${esc(opt.label)}</div>
        <div class="a-sub">${esc(opt.sub)}</div>
        <div class="a-badge">${esc(BADGE_LABELS[opt.min])}</div>
      </div>`;
    }

    qHtml += `<div class="q-row">
      <div class="${qLabelClass}">
        <div class="q-num">Q${ROUTING_QUESTIONS.indexOf(q)+1}</div>
        <div class="q-name">${esc(q.label)}</div>
        <div class="q-text">${esc(q.text)}</div>
      </div>
      <div class="answers-row">${cellsHtml}</div>
    </div>`;
  }

  // Result bar — show live result from whatever's answered so far
  const anyAnswered = Object.keys(answers).length > 0;
  let resultHtml;
  if (!anyAnswered) {
    resultHtml = `<span class="result-label-sm">Routing result:</span><span class="result-badge" style="background:#888">Full Auto</span><span class="result-constraint">Answer questions to see routing.</span>`;
  } else {
    resultHtml = `<span class="result-label-sm">Routing result:</span><span class="result-badge" style="background:${BUCKETS[bucket].color}">${BUCKETS[bucket].label}</span>`;
    if (sourceLabel) {
      resultHtml += `<span class="result-constraint">Binding constraint: <strong>${esc(sourceLabel)}</strong></span>`;
    } else {
      resultHtml += `<span class="result-constraint">No overriding minimum — defaulting to Full Auto.</span>`;
    }
  }

  const isLast = idx === clusters.length - 1;
  const prevDisabled = idx === 0;
  const nextLabel = isLast ? 'Proceed to Skill Sort →' : 'Next Cluster →';

  document.getElementById('phase-routing').innerHTML = `
    <div class="cluster-progress">
      <div class="cp-label">Cluster ${idx+1} of ${clusters.length}</div>
      <div class="cp-pips">${pips}</div>
    </div>
    <div class="cluster-card">
      <h2>${esc(cluster.label)}</h2>
      <p>${esc(cluster.description)}</p>
    </div>
    <div class="questions-wrap">
      <div class="dir-bar">
        <div class="dir-spacer"></div>
        <div class="dir-text">← More human oversight &nbsp;·&nbsp; More AI autonomy →</div>
      </div>
      ${qHtml}
    </div>
    <div class="result-bar">${resultHtml}</div>
    <div class="routing-nav">
      <button class="btn btn-sec" onclick="prevCluster()" ${prevDisabled?'disabled':''}>← Previous</button>
      <button class="btn btn-pri" onclick="nextCluster()" id="btn-next">${nextLabel}</button>
    </div>
  `;

}

function selectAnswer(clusterId, qId, score) {
  if (!APP.answers[clusterId]) APP.answers[clusterId] = {};
  APP.answers[clusterId][qId] = score;
  renderRoutingPhase();
}

function nextCluster() {
  const clusters = APP.roleData.clusters;
  const idx = APP.clusterIdx;
  const cluster = clusters[idx];
  const answers = APP.answers[cluster.id] || {};
  // Save result
  const { bucket, sourceQId, sourceLabel } = computeResult(answers);
  APP.results[cluster.id] = bucket;
  if (sourceQId) APP.constraints[cluster.id] = { qId: sourceQId, label: sourceLabel };
  if (idx === clusters.length - 1) {
    // Initialize placements
    APP.roleData.skills.forEach(s => { APP.placements[s.name] = 'pool'; });
    showPhase('skills');
  } else {
    APP.clusterIdx++;
    renderRoutingPhase();
  }
}

function prevCluster() {
  if (APP.clusterIdx > 0) { APP.clusterIdx--; renderRoutingPhase(); }
}

// ─── PHASE 3: SKILL SORT ──────────────────────────────────────
function skillId(name) {
  return 'skill-' + name.replace(/[^a-zA-Z0-9]/g, '_');
}

function pillCatClass(cat) {
  return CAT_CLASS[cat] || 'cat-baseline';
}

function makePill(name, cat, opts) {
  const sid = skillId(name);
  const catCls = opts?.gap ? 'cat-gap' : pillCatClass(cat);
  const isDropped = APP.drops[name];
  const bucket = opts?.bucket;
  const needsConfirm = bucket === 'hotl' || bucket === 'auto';
  const checked = isDropped ? 'checked' : '';
  const droppedCls = isDropped ? ' dropped' : '';
  let confirmHtml = '';
  if (needsConfirm) {
    confirmHtml = `<span class="pill-drop-confirm">
      <input type="checkbox" id="dc_${sid}" ${checked} onchange="toggleDrop('${esc(name)}',this.checked)" title="Confirm this skill can be dropped">
      <label for="dc_${sid}">Drop</label>
    </span>`;
  }
  const gapCls = opts?.gap ? ' gap-pill' : '';
  return `<div class="skill-pill ${catCls}${gapCls}${droppedCls}"
    id="${sid}"
    draggable="true"
    data-skill="${esc(name)}"
    data-cat="${esc(cat||'')}"
    data-gap="${opts?.gap ? '1' : '0'}">
    <span style="flex:1">${esc(name)}</span>
    ${confirmHtml}
  </div>`;
}

function renderSkillSortPhase() {
  const clusters = APP.roleData.clusters;
  const skills = APP.roleData.skills;

  // Sort clusters by result level (most human first)
  const sortedClusters = [...clusters].sort((a, b) => {
    const la = LEVEL[APP.results[a.id] || 'auto'] || 0;
    const lb = LEVEL[APP.results[b.id] || 'auto'] || 0;
    return lb - la;
  });

  // Pool skills — sorted by category: Foundational → Core → Baseline
  const CAT_ORDER = ['Foundational & Leadership Skills','Core Role-Specific Skills','Baseline Applied Skills'];
  const sortedSkills = [...skills].sort((a,b) => {
    return (CAT_ORDER.indexOf(a.cat) === -1 ? 99 : CAT_ORDER.indexOf(a.cat)) -
           (CAT_ORDER.indexOf(b.cat) === -1 ? 99 : CAT_ORDER.indexOf(b.cat));
  });
  let poolHtml = '';
  sortedSkills.forEach(s => {
    if (APP.placements[s.name] === 'pool') {
      poolHtml += makePill(s.name, s.cat, {});
    }
  });
  APP.newSkills.filter(ns => ns.clusterId === 'pool').forEach(ns => {
    poolHtml += makePill(ns.name, null, { gap: true });
  });

  // Cluster columns (4-col grid)
  let colsHtml = '';
  for (const cluster of sortedClusters) {
    const bucket = APP.results[cluster.id] || 'auto';
    const bkt = BUCKETS[bucket];
    const claimedSkills = skills.filter(s => APP.placements[s.name] === cluster.id);
    const claimedNew = APP.newSkills.filter(ns => ns.clusterId === cluster.id);

    let pillsHtml = claimedSkills.map(s => makePill(s.name, s.cat, { bucket })).join('');
    pillsHtml += claimedNew.map(ns => makePill(ns.name, null, { gap:true, bucket })).join('');
    if (!pillsHtml) pillsHtml = '<div class="empty-hint">Drop skills here</div>';

    const tip = GAP_TIPS[bucket] || '';
    const fateText = bucket === 'hl' ? 'Skills here: <strong>Deepen</strong>' :
                     bucket === 'hitl' ? 'Skills here: <strong>Persist</strong>' :
                     'Skills here: <strong>Potential Drop</strong>';

    colsHtml += `<div class="cluster-col" data-cid="${cluster.id}">
      <div class="cluster-col-header" style="background:${bkt.color}">
        <div class="bucket-badge">${esc(bkt.label)}</div>
        <h3>${esc(cluster.label)}</h3>
        <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:4px">${fateText}</div>
      </div>
      <div class="cluster-drop-zone" data-cid="${cluster.id}">${pillsHtml}</div>
      <div class="gap-wrap" data-tip="${esc(tip)}">
        <button class="gap-btn" onclick="showGapInput('${cluster.id}')">+ Add gap skill</button>
        <div class="gap-input-wrap hidden" id="gap-input-${cluster.id}">
          <input type="text" id="gap-text-${cluster.id}" placeholder="Skill name…" onkeydown="if(event.key==='Enter')commitGap('${cluster.id}')">
          <button onclick="commitGap('${cluster.id}')">Add</button>
        </div>
      </div>
    </div>`;
  }

  // Summary table — per-skill fate (initial render, all in pool = Unassigned)
  const CAT_ORDER_SS = ['Foundational & Leadership Skills','Core Role-Specific Skills','Baseline Applied Skills'];
  const tbRows = [...sortedSkills].sort((a,b) => {
    const ai = CAT_ORDER_SS.indexOf(a.cat); const bi = CAT_ORDER_SS.indexOf(b.cat);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  }).map(s => {
    const fate = skillFate(s.name, false);
    return `<tr><td><strong>${esc(s.name)}</strong></td><td style="color:#888;font-size:11px">${esc(s.cat)}</td><td><span class="tb-badge ${fate.cls}">${fate.label}</span></td></tr>`;
  }).join('');

  document.getElementById('phase-skills').innerHTML = `
    <div class="ss-header">
      <h2>Skill Sort — ${esc(APP.role)}</h2>
      <p>Drag each skill into the cluster where it matters most. For HOTL and Full Auto clusters, confirm which skills can be dropped.</p>
    </div>
    <div class="ss-pool-label">Skill Pool <span style="font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;color:#aaa">— drag pills into clusters below</span></div>
    <div id="pool-drop-zone" data-cid="pool">${poolHtml}</div>
    <div class="cat-legend">
      <span><span class="legend-dot" style="background:#2C5F8A"></span>Foundational &amp; Leadership</span>
      <span><span class="legend-dot" style="background:#5A7A3A"></span>Core Role-Specific</span>
      <span><span class="legend-dot" style="background:#7A5A2A"></span>Baseline Applied</span>
    </div>
    <div class="seq-bar">Most human oversight <div class="seq-line"></div> Full Auto</div>
    <div id="ss-columns" style="grid-template-columns:repeat(${sortedClusters.length},1fr)">${colsHtml}</div>
    <div class="ss-summary">
      <h3>Skill Fate Summary</h3>
      <table class="summary-table" id="ss-summary">
        <thead><tr>
          <th>Skill</th><th>Category</th><th>Fate</th>
        </tr></thead>
        <tbody>${tbRows}</tbody>
      </table>
      <div class="export-row">
        <button class="btn-export" onclick="downloadReport()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Report
        </button>
      </div>
    </div>
  `;

  initDragDrop();
}

function skillFate(skillName, isGap) {
  if (APP.drops[skillName]) return { label: 'Dropped', cls: 'fate-dropped' };
  // Gap skills always read as "New Skill" — they're additive, not subject to displacement logic
  if (isGap) return { label: 'New Skill', cls: 'fate-new' };
  let placement = APP.placements[skillName];
  if (!placement || placement === 'pool') return { label: 'Unassigned', cls: 'fate-unassigned' };
  const bucket = APP.results[placement] || 'auto';
  if (bucket === 'hl')   return { label: 'Deepens', cls: 'fate-deepens' };
  if (bucket === 'hitl') return { label: 'Persists', cls: 'fate-persists' };
  return { label: 'Potential Drop', cls: 'fate-drop' };
}

function updateSummary() {
  const skills = APP.roleData.skills;
  const CAT_ORDER = ['Foundational & Leadership Skills','Core Role-Specific Skills','Baseline Applied Skills'];
  const allSkills = [...skills].sort((a,b) => {
    const ai = CAT_ORDER.indexOf(a.cat); const bi = CAT_ORDER.indexOf(b.cat);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  // Include gap skills too
  const allEntries = [
    ...allSkills.map(s => ({ name: s.name, cat: s.cat, gap: false })),
    ...APP.newSkills.map(ns => ({ name: ns.name, cat: 'Gap Skill', gap: true })),
  ];
  let tbRows = '';
  for (const s of allEntries) {
    const fate = skillFate(s.name, s.gap);
    const isDropped = APP.drops[s.name];
    tbRows += `<tr class="${isDropped ? 'skill-dropped' : ''}">
      <td><strong>${esc(s.name)}</strong></td>
      <td style="color:#888;font-size:11px">${esc(s.cat)}</td>
      <td><span class="tb-badge ${fate.cls}">${fate.label}</span></td>
    </tr>`;
  }
  const tbody = document.querySelector('#ss-summary tbody');
  if (tbody) tbody.innerHTML = tbRows;
}

  }

</style></head>
<body>
<div class="rpt-header">
  <h1>AI Routing Workshop Report</h1>
  <div class="meta">${esc(role)} &nbsp;·&nbsp; Generated ${date} &nbsp;·&nbsp; SFWI Workshop</div>
</div>
<div class="rpt-body">
  <h2>Task Cluster Routings</h2>
  <table>
    <thead><tr><th>Cluster</th><th>Routing Decision</th><th>Binding Constraint</th></tr></thead>
    <tbody>${taskRows}</tbody>
  </table>

  <h2>Skill Implications</h2>
  <table>
    <thead><tr><th>Skill</th><th>Category</th><th>Fate</th><th>Takeaway</th></tr></thead>
    <tbody>${skillRows}</tbody>
  </table>

  <div class="legend">
    <strong>How to read skill fates:</strong>
    <ul>
      <li><strong>Deepens</strong> — Human expertise is the differentiator; invest in development of this skill.</li>
      <li><strong>Persists</strong> — Skill remains essential; AI assists but humans own every output.</li>
      <li><strong>Potential Drop</strong> — At risk; confirm whether meaningful human judgment is still required.</li>
      <li><strong>Dropped</strong> — Confirmed automatable; redirect development investment.</li>
    </ul>
  </div>
  <div class="footer">SFWI AI Routing Workshop &nbsp;·&nbsp; Burning Glass Institute</div>
</div>
</body></html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'SFWI-Workshop-' + role.replace(/[^a-zA-Z0-9]+/g,'-') + '-' + new Date().toISOString().slice(0,10) + '.html';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function toggleDrop(skillName, checked) {
  APP.drops[skillName] = checked;
  const sid = skillId(skillName);
  const pill = document.getElementById(sid);
  if (pill) {
    if (checked) pill.classList.add('dropped');
    else pill.classList.remove('dropped');
  }
  updateSummary();
}

function showGapInput(clusterId) {
  const wrap = document.getElementById('gap-input-' + clusterId);
  if (wrap) {
    wrap.classList.toggle('hidden');
    const inp = document.getElementById('gap-text-' + clusterId);
    if (inp && !wrap.classList.contains('hidden')) inp.focus();
  }
}

function commitGap(clusterId) {
  const inp = document.getElementById('gap-text-' + clusterId);
  const name = inp ? inp.value.trim() : '';
  if (!name) return;
  const existing = APP.newSkills.find(ns => ns.name === name);
  if (existing) return;
  const ns = { name, clusterId, id: 'gap_' + Date.now() };
  APP.newSkills.push(ns);
  // Add pill to drop zone
  const bucket = APP.results[clusterId] || 'auto';
  const zone = document.querySelector(`.cluster-drop-zone[data-cid="${clusterId}"]`);
  if (zone) {
    const tmp = document.createElement('div');
    tmp.innerHTML = makePill(name, null, { gap:true, bucket });
    zone.appendChild(tmp.firstElementChild);
  }
  inp.value = '';
  document.getElementById('gap-input-' + clusterId).classList.add('hidden');
  updateSummary();
}

// ─── DRAG AND DROP ────────────────────────────────────────────
function initDragDrop() {
  if (dragDropInitialized) return;
  dragDropInitialized = true;

  document.addEventListener('dragstart', e => {
    const pill = e.target.closest('.skill-pill');
    if (!pill) return;
    draggingId = pill.dataset.skill;
    pill.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggingId);
  });

  document.addEventListener('dragend', e => {
    document.querySelectorAll('.skill-pill.dragging').forEach(p => p.classList.remove('dragging'));
    document.querySelectorAll('.drag-over').forEach(z => z.classList.remove('drag-over'));
    draggingId = null;
  });

  document.addEventListener('dragover', e => {
    const zone = e.target.closest('.drop-zone, .cluster-drop-zone');
    if (!zone) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.drag-over').forEach(z => z.classList.remove('drag-over'));
    zone.classList.add('drag-over');
  });

  document.addEventListener('drop', e => {
    const zone = e.target.closest('.drop-zone, .cluster-drop-zone');
    if (!zone || !draggingId) return;
    e.preventDefault();
    zone.classList.remove('drag-over');
    const skillName = draggingId;
    const targetCid = zone.dataset.cid;
    movePill(skillName, targetCid, zone);
  });
}

function movePill(skillName, targetCid, targetZone) {
  const sid = skillId(skillName);
  const pill = document.getElementById(sid);
  if (!pill) return;

  APP.placements[skillName] = targetCid;

  // Update confirm checkbox visibility based on target bucket
  const bucket = targetCid === 'pool' ? null : (APP.results[targetCid] || 'auto');
  const needsConfirm = bucket === 'hotl' || bucket === 'auto';
  const existingConfirm = pill.querySelector('.pill-drop-confirm');
  if (needsConfirm && !existingConfirm) {
    const isDropped = APP.drops[skillName];
    const confirmSpan = document.createElement('span');
    confirmSpan.className = 'pill-drop-confirm';
    confirmSpan.innerHTML = `<input type="checkbox" id="dc_${sid}" ${isDropped?'checked':''} onchange="toggleDrop('${esc(skillName)}',this.checked)" title="Confirm this skill can be dropped"><label for="dc_${sid}">Drop</label>`;
    pill.appendChild(confirmSpan);
  } else if (!needsConfirm && existingConfirm) {
    existingConfirm.remove();
  }

  targetZone.appendChild(pill);

  // Update pool placeholder
  const poolZone = document.getElementById('pool-drop-zone');
  if (poolZone) {
    const hasPills = poolZone.querySelector('.skill-pill');
    let placeholder = poolZone.querySelector('.pool-placeholder');
    if (!hasPills && !placeholder) {
      placeholder = document.createElement('div');
      placeholder.className = 'pool-placeholder';
      placeholder.style.cssText = 'font-size:12px;color:#aaa;text-align:center;padding:10px';
      placeholder.textContent = 'All skills placed';
      poolZone.appendChild(placeholder);
    } else if (hasPills && placeholder) {
      placeholder.remove();
    }
  }

  updateSummary();
}

// ─── UTILITY ──────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ─── INIT ─────────────────────────────────────────────────────
renderRolePhase();
</script>
